<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Evolving Software</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://js.puter.com/v2/"></script>
<style>
  :root{
    --bg0:#06070c;--bg1:#0b0e18;--sidebar:#090c14;--line:rgba(255,255,255,.07);--line-hi:rgba(255,255,255,.14);
    --txt:#f0f2f8;--dim:#8b94ad;--dimmer:#5d6479;--accent:#a78bff;--accent2:#5ee0ff;
    --live:#3fe4a8;--think:#ffcf5c;--err:#ff7086;--vol:0;
    --nav-h:52px;--left-w:240px;--right-w:360px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:'Inter',ui-sans-serif,-apple-system,sans-serif;color:var(--txt);background:var(--bg0);
    display:grid;grid-template-rows:var(--nav-h) 1fr;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(60% 45% at 15% 10%,rgba(167,139,255,.18),transparent 60%),
      radial-gradient(50% 40% at 90% 5%,rgba(94,224,255,.10),transparent 55%),linear-gradient(180deg,var(--bg1),var(--bg0));
  }

  /* navbar */
  .navbar{
    display:flex;align-items:center;gap:16px;padding:0 20px;border-bottom:1px solid var(--line);
    background:rgba(9,12,20,.85);backdrop-filter:blur(12px);z-index:10;
  }
  .brand{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--dimmer);transition:all .3s}
  body[data-state="listening"] .dot{background:var(--live);box-shadow:0 0 10px var(--live)}
  body[data-state="thinking"] .dot{background:var(--think);box-shadow:0 0 10px var(--think)}
  body[data-state="speaking"] .dot{background:var(--accent);box-shadow:0 0 10px var(--accent)}
  body[data-state="error"] .dot{background:var(--err);box-shadow:0 0 10px var(--err)}
  .nav-path{flex:1;font:500 12px/1 ui-monospace,Menlo,monospace;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nav-meta{font:500 11px/1 ui-monospace,Menlo,monospace;color:var(--dimmer);padding:4px 8px;border:1px solid var(--line);border-radius:6px}
  .nav-status{font-size:11px;color:var(--dimmer)}

  /* app shell */
  .app{display:grid;grid-template-columns:var(--left-w) 1fr var(--right-w);height:100%;overflow:hidden}
  .sidebar{border-right:1px solid var(--line);background:rgba(9,12,20,.6);overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:12px}
  .sidebar-right{border-right:none;border-left:1px solid var(--line)}
  .sidebar-h{font-size:10px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:var(--dimmer);margin:4px 8px 6px}

  /* left nav */
  .nav-item{
    display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;border-radius:10px;
    background:transparent;color:var(--dim);font:600 13px/1 'Inter',sans-serif;cursor:pointer;text-align:left;
    transition:background .15s,color .15s;
  }
  .nav-item:hover{background:rgba(255,255,255,.04);color:var(--txt)}
  .nav-item.active{background:rgba(167,139,255,.14);color:var(--txt);box-shadow:inset 0 0 0 1px rgba(167,139,255,.25)}
  .nav-item .badge{margin-left:auto;padding:1px 6px;border-radius:999px;font-size:10px;background:var(--think);color:#1a1400;display:none}
  .nav-item .badge.show{display:inline-block}

  /* agent list in sidebar */
  .agent-list{display:flex;flex-direction:column;gap:4px}
  .agent-row{
    display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;
    border:1px solid transparent;font-size:12.5px;color:#cdd4e6;transition:background .15s,border-color .15s;
  }
  .agent-row:hover{background:rgba(255,255,255,.04)}
  .agent-row.sel{background:rgba(167,139,255,.10);border-color:rgba(167,139,255,.25)}
  .agent-row .ad{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .agent-row .ad.run{background:var(--think)} .agent-row .ad.pause{background:var(--dimmer)} .agent-row .ad.idle{background:var(--live)}
  .agent-row .an{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* center stage */
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;position:relative}
  .banner{display:none;width:100%;max-width:420px;margin-bottom:16px;padding:10px 14px;border-radius:12px;
    background:rgba(255,112,134,.08);border:1px solid rgba(255,112,134,.28);color:#ffd7de;font-size:12.5px;line-height:1.5}
  .banner.show{display:block}
  .banner code{color:#fff;background:rgba(0,0,0,.35);padding:1px 6px;border-radius:6px;font-size:11px}
  .stage{position:relative;width:260px;height:260px;display:grid;place-items:center;margin-bottom:12px}
  .halo{position:absolute;inset:6px;border-radius:50%;opacity:0;transition:opacity .5s;
    background:radial-gradient(circle,rgba(167,139,255,.35),transparent 62%),radial-gradient(circle at 60% 40%,rgba(94,224,255,.25),transparent 65%)}
  body[data-state="listening"] .halo,body[data-state="speaking"] .halo{opacity:1;animation:breathe 3.2s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(.92)}50%{transform:scale(1.08)}}
  .vol{position:absolute;inset:34px;border-radius:50%;border:1px solid rgba(255,255,255,.06);
    box-shadow:0 0 0 calc(var(--vol)*20px) rgba(63,228,168,.10);transition:box-shadow .12s;pointer-events:none}
  body[data-state="speaking"] .vol{box-shadow:0 0 0 calc(var(--vol)*20px) rgba(167,139,255,.14)}
  .ring{position:absolute;inset:22px;border-radius:50%;border:1.5px solid transparent;pointer-events:none}
  body[data-state="listening"] .ring{border-color:rgba(63,228,168,.65);animation:pulse 1.9s ease-out infinite}
  body[data-state="speaking"] .ring{border-color:rgba(167,139,255,.7);animation:pulse 1.4s ease-out infinite}
  body[data-state="thinking"] .ring{border-color:transparent;border-top-color:var(--think);border-right-color:var(--think);animation:spin 1.1s linear infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,228,168,.35)}100%{box-shadow:0 0 0 40px rgba(63,228,168,0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .mic{
    position:relative;width:160px;height:160px;border-radius:50%;cursor:pointer;user-select:none;
    display:grid;place-items:center;border:1px solid var(--line-hi);
    background:radial-gradient(circle at 32% 26%,rgba(255,255,255,.09),transparent 45%),radial-gradient(circle,#1a2138,#0d1120 78%);
    box-shadow:0 16px 50px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.10);transition:transform .2s;
  }
  .mic:hover{transform:scale(1.04)} .mic:active{transform:scale(.97)}
  .mic .ico{font-size:52px;filter:drop-shadow(0 3px 10px rgba(0,0,0,.5))}
  .state{font-size:14px;color:var(--dim);margin:8px 0 4px;text-align:center}
  .state b{color:var(--txt)}
  .hint{font-size:11.5px;color:var(--dimmer);text-align:center}
  kbd{font-size:10px;padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--txt)}

  /* right panel */
  .panel{display:none;flex-direction:column;gap:10px;flex:1;min-height:0}
  .panel.active{display:flex}
  .card{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;min-height:0}
  .card.grow{flex:1}
  .lbl{display:flex;align-items:center;gap:8px;font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--dim);margin-bottom:8px;font-weight:600}
  .tag{width:6px;height:6px;border-radius:50%}
  .tag.you{background:var(--live)} .tag.cc{background:var(--accent)}
  .muted{color:var(--dimmer)!important;opacity:.7;font-style:italic}
  #you{color:#d6f2e5;font-size:14px;line-height:1.55;min-height:20px}
  #claude{color:var(--txt);white-space:pre-wrap;line-height:1.6;font-size:14px;min-height:20px}
  .scroll{overflow-y:auto;flex:1;min-height:0;display:flex;flex-direction:column;gap:6px}
  #trace,#historyList,#historyDetail,#agentChat,#agentTrace{max-height:none}

  .btn{padding:7px 12px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.04);
    color:var(--txt);font:600 11px/1 'Inter',sans-serif;cursor:pointer;transition:background .15s}
  .btn:hover{background:rgba(255,255,255,.08)} .btn.primary{background:rgba(167,139,255,.18);border-color:rgba(167,139,255,.35)}
  .btn-block{width:100%;margin-top:4px}
  .prompt-area{width:100%;min-height:72px;resize:vertical;padding:10px;border-radius:10px;border:1px solid var(--line);
    background:rgba(0,0,0,.25);color:var(--txt);font:400 12.5px/1.5 'Inter',sans-serif}
  .task-row{display:flex;gap:6px;margin-top:6px}
  .task-row input{flex:1;padding:8px 10px;border-radius:9px;border:1px solid var(--line);background:rgba(0,0,0,.25);color:var(--txt);font-size:13px}
  .toolbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}

  .act{display:flex;gap:8px;font-size:12.5px;color:#cdd4e6;line-height:1.4;padding:7px 9px;border-radius:9px;
    background:rgba(255,255,255,.02);border:1px solid transparent;animation:actin .25s ease}
  @keyframes actin{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
  .act .aico{flex:0 0 16px;font-size:10px;font-weight:700;text-align:center;margin-top:2px}
  .act.tool .aico{color:var(--accent2)} .act.thinking .aico{color:var(--think)}
  .act.thinking{background:rgba(255,207,92,.04);border-color:rgba(255,207,92,.15)} .act.thinking .body{white-space:pre-wrap;color:#e8dcc0;font-size:12px}
  .act.say{font-style:italic;color:var(--dim)} .act.result{font-size:12px;color:#b8c8be}
  .act.result.err{color:#ffc8d0} .act .code{font-family:ui-monospace,Menlo,monospace;font-size:11.5px}
  .act .detail{display:block;margin-top:3px;font:11px/1.4 ui-monospace,Menlo,monospace;color:var(--dimmer);word-break:break-all}

  .chat-msg{padding:8px 10px;border-radius:9px;font-size:12.5px;line-height:1.5}
  .chat-msg.user{background:rgba(63,228,168,.08);color:#d6f2e5} .chat-msg.bot{background:rgba(167,139,255,.08)}
  .sess-row,.turn-block{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid var(--line);cursor:pointer;margin-bottom:6px}
  .sess-row:hover{border-color:var(--line-hi)} .turn-user{color:#d6f2e5;font-size:13px} .turn-reply{font-size:13px;white-space:pre-wrap}
  .turn-lbl{font-size:10px;text-transform:uppercase;color:var(--dim);margin:6px 0 4px} .turn-err{color:#ffc8d0;font-size:12px}
  .backbtn{align-self:flex-start;background:transparent;border:1px solid var(--line);color:var(--dim);font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer;margin-bottom:8px}

  .view{display:none} .view.active{display:contents}

  @media(max-width:960px){
    .app{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}
    .sidebar-left{flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid var(--line);max-height:140px}
    .sidebar-right{border-left:none;border-top:1px solid var(--line);max-height:40vh}
    .agent-list{flex-direction:row;flex-wrap:wrap} .agent-row{flex:1;min-width:140px}
  }
</style>
</head>
<body data-state="idle">

<header class="navbar">
  <div class="brand"><span class="dot"></span>Evolving Software</div>
  <div class="nav-path" id="sessPath" title="">connecting…</div>
  <div class="nav-meta" id="sessId">session —</div>
  <div class="nav-status" id="foot">connecting…</div>
</header>

<div class="app">
  <!-- LEFT SIDEBAR -->
  <aside class="sidebar sidebar-left">
    <div class="sidebar-h">Navigate</div>
    <button type="button" class="nav-item active" data-view="chat">💬 Chat</button>
    <button type="button" class="nav-item" data-view="trace">⚡ Live trace<span class="badge" id="traceBadge">new</span></button>
    <button type="button" class="nav-item" data-view="agents">🤖 Agent config</button>
    <button type="button" class="nav-item" data-view="history">📜 History</button>

    <div class="sidebar-h">Agents</div>
    <div class="agent-list" id="agentDash"></div>
    <button type="button" class="btn btn-block primary" id="btnNewAgent">+ New agent</button>
  </aside>

  <!-- CENTER: mic -->
  <main class="center">
    <div class="banner" id="banner"></div>
    <div class="stage">
      <div class="halo"></div><div class="vol"></div><div class="ring"></div>
      <div class="mic" id="mic" role="button" tabindex="0" title="Start / stop">
        <span class="ico" id="ico">🎙️</span>
      </div>
    </div>
    <div class="state" id="state">Click the mic to start</div>
    <div class="hint" id="hint">press <kbd>Space</kbd> or click to toggle</div>
  </main>

  <!-- RIGHT SIDEBAR -->
  <aside class="sidebar sidebar-right">
    <div class="panel active" id="panelChat">
      <div class="card"><div class="lbl"><span class="tag you"></span>You</div><div id="you" class="muted">waiting…</div></div>
      <div class="card grow"><div class="lbl"><span class="tag cc"></span>Claude</div><div id="claude" class="muted scroll">standing by…</div></div>
    </div>

    <div class="panel" id="panelTrace">
      <div class="card grow"><div class="lbl"><span class="tag cc"></span>Live agent output</div><div class="scroll" id="trace"></div></div>
    </div>

    <div class="panel" id="panelAgents">
      <div class="card" id="agentDetail">
        <div class="lbl"><span class="tag cc"></span><span id="agentDetailName">Select an agent</span></div>
        <div class="toolbar">
          <button type="button" class="btn primary" id="btnSelectVoice">Use for voice</button>
          <button type="button" class="btn" id="btnPause">Pause</button>
          <button type="button" class="btn" id="btnHandoff">Hand off</button>
        </div>
        <div class="lbl" style="margin-top:8px"><span class="tag cc"></span>System prompt</div>
        <textarea class="prompt-area" id="agentPrompt" placeholder="Instructions for this agent…"></textarea>
        <button type="button" class="btn" id="btnSavePrompt">Save prompt</button>
        <div class="task-row">
          <input id="agentTask" placeholder="Send a task…" />
          <button type="button" class="btn primary" id="btnRunTask">Run</button>
        </div>
      </div>
      <div class="card grow"><div class="lbl"><span class="tag you"></span>Conversation</div><div class="scroll" id="agentChat"></div></div>
      <div class="card grow"><div class="lbl"><span class="tag cc"></span>Activity</div><div class="scroll" id="agentTrace"></div></div>
    </div>

    <div class="panel" id="panelHistory">
      <div class="card grow">
        <div class="lbl" id="historyLbl"><span class="tag cc"></span>Past sessions</div>
        <div class="scroll" id="historyList"></div>
        <div class="scroll" id="historyDetail" style="display:none"></div>
      </div>
    </div>
  </aside>
</div>

<!-- hidden views for JS compat -->
<div class="view active" id="viewChat"></div>
<div class="view" id="viewTrace"></div>
<div class="view" id="viewAgents"></div>
<div class="view" id="viewHistory"></div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const body=document.body, micEl=$('mic'), icoEl=$('ico'), stateEl=$('state'),
        hintEl=$('hint'), youEl=$('you'), claudeEl=$('claude'), footEl=$('foot'), bannerEl=$('banner'),
        traceEl=$('trace'), traceBadge=$('traceBadge'), sessPathEl=$('sessPath'), sessIdEl=$('sessId'),
        historyListEl=$('historyList'), historyDetailEl=$('historyDetail'), historyLblEl=$('historyLbl'),
        agentDashEl=$('agentDash'), agentDetailEl=$('agentDetail'), agentPromptEl=$('agentPrompt'),
        agentChatEl=$('agentChat'), agentTraceEl=$('agentTrace'), agentTaskEl=$('agentTask');
  let activeView='chat', agents=[], selectedAgentId=null, activeVoiceAgentId=null;
  const agentTraces=new Map(), agentChats=new Map(), agentFeeds=new Map();
  let defaultPrompt='';

  const ICON={idle:'🎙️',listening:'🎧',thinking:'💭',speaking:'🔊',error:'⚠️'};
  const TEXT={idle:'Click the mic to start',listening:'<b>Listening…</b> go ahead',
              thinking:'<b>Working…</b>',speaking:'<b>Speaking…</b>',error:'<b>Error</b>'};
  function setState(s,extra){ body.dataset.state=s; icoEl.textContent=ICON[s]||'🎙️'; stateEl.innerHTML=extra||TEXT[s]||''; }
  function banner(html){ if(!html){bannerEl.classList.remove('show');return;} bannerEl.innerHTML=html; bannerEl.classList.add('show'); }

  let running=false, bridge=null, bridgeReady=false;
  let audioCtx=null, micStream=null, node=null, analyser=null, volTimer=null;
  let pcm=new Int16Array(0); const CHUNK=1280;

  if(location.protocol==='file:'){
    banner('Run <code>npm start</code> then open <code>http://localhost:5111</code>');
    setState('error'); hintEl.textContent='';
  }

  function connectBridge(){
    try{
      bridge=new WebSocket('ws://'+location.host);
      bridge.binaryType='arraybuffer';
      bridge.onopen=()=>{ bridgeReady=true; footEl.textContent='connected ✓'; };
      bridge.onclose=()=>{ bridgeReady=false; if(running)setState('error','<b>Bridge lost</b>'); footEl.textContent='reconnecting…'; setTimeout(connectBridge,1500); };
      bridge.onerror=()=>{ footEl.textContent='bridge error'; };
      bridge.onmessage=onBridge;
    }catch(e){ footEl.textContent='error: '+e.message; }
  }

  function onBridge(ev){
    let m; try{ m=JSON.parse(ev.data); }catch{ return; }
    if(m.type==='agents'){ agents=m.agents||[]; renderAgentDash(); return; }
    if(m.type==='active_agent'){ activeVoiceAgentId=m.agentId; renderAgentDash(); if(m.agentId===selectedAgentId) $('btnSelectVoice').textContent='Voice ✓'; return; }
    if(m.type==='agent:created'||m.type==='agent:handoff'){ if(m.agentId) selectAgent(m.agentId); return; }
    const aid=m.agentId||activeVoiceAgentId;
    if(m.type==='status'){ if(m.state&&aid===activeVoiceAgentId) setState(m.state,m.detail?('<b>'+m.detail+'</b>'):null); }
    else if(m.type==='partial'){ if(aid===activeVoiceAgentId){ youEl.classList.remove('muted'); youEl.textContent=m.text; } }
    else if(m.type==='transcript'){ if(aid===activeVoiceAgentId){ youEl.classList.remove('muted'); youEl.textContent=m.text; } clearAgentTrace(aid); addChat(aid,'user',m.text); clearActivity(); }
    else if(m.type==='session'){ if(aid===activeVoiceAgentId) setSession(m.cwd,m.sessionId); }
    else if(m.type==='activity'){ addActivity(m,aid); bumpFeed(aid,m); }
    else if(m.type==='agent:reply'||m.type==='reply'){
      addChat(aid,'bot',m.text);
      if(aid===activeVoiceAgentId) speak(m.text,m.error);
      else if(selectedAgentId===aid) loadAgentChat(aid);
    }
    else if(m.type==='agent:error'){ addChat(aid,'bot','Error: '+(m.error||'unknown')); }
  }

  function setSession(cwd,sid){
    if(cwd){ sessPathEl.textContent=cwd; sessPathEl.title=cwd; }
    if(sid){ sessIdEl.textContent=String(sid).slice(0,8); sessIdEl.title=sid; }
  }

  const panels={chat:'panelChat',trace:'panelTrace',agents:'panelAgents',history:'panelHistory'};
  document.querySelectorAll('.nav-item').forEach((btn)=>{
    btn.addEventListener('click',()=>{
      activeView=btn.dataset.view||'chat';
      document.querySelectorAll('.nav-item').forEach(t=>t.classList.toggle('active',t.dataset.view===activeView));
      Object.values(panels).forEach(id=>$(id).classList.remove('active'));
      $(panels[activeView]).classList.add('active');
      if(activeView==='trace') traceBadge.classList.remove('show');
      if(activeView==='history') loadHistory();
      if(activeView==='agents'&&selectedAgentId) loadAgentChat(selectedAgentId);
    });
  });

  function wsSend(obj){ if(bridgeReady) try{bridge.send(JSON.stringify(obj));}catch{} }
  function renderAgentDash(){
    agentDashEl.innerHTML='';
    for(const a of agents){
      const row=document.createElement('div');
      row.className='agent-row'+(a.id===selectedAgentId?' sel':'')+(a.id===activeVoiceAgentId?' voice':'');
      const dot=document.createElement('span');
      dot.className='ad '+(a.busy?'run':a.status==='paused'?'pause':'idle');
      const name=document.createElement('span'); name.className='an'; name.textContent=a.name+(a.id===activeVoiceAgentId?' 🎙':'');
      row.appendChild(dot); row.appendChild(name);
      row.addEventListener('click',()=>{ selectAgent(a.id); $('panelAgents').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(t=>t.classList.toggle('active',t.dataset.view==='agents'));
        activeView='agents'; });
      agentDashEl.appendChild(row);
    }
  }

  function selectAgent(id){
    selectedAgentId=id;
    const a=agents.find(x=>x.id===id); if(!a) return;
    $('agentDetailName').textContent=a.name;
    agentPromptEl.value=a.system_prompt||defaultPrompt;
    $('btnPause').textContent=a.status==='paused'?'Resume':'Pause';
    $('btnSelectVoice').textContent=id===activeVoiceAgentId?'Voice ✓':'Use for voice';
    renderAgentDash(); loadAgentChat(id); syncAgentTrace(id);
  }

  function loadAgentChat(id){
    agentChatEl.innerHTML='';
    fetch('/api/agents/'+encodeURIComponent(id)).then(r=>r.json()).then((data)=>{
      for(const t of (data.turns||[])){
        const u=document.createElement('div'); u.className='chat-msg user'; u.textContent=t.user_text||''; agentChatEl.appendChild(u);
        if(t.reply_text){ const b=document.createElement('div'); b.className='chat-msg bot'; b.textContent=t.reply_text; agentChatEl.appendChild(b); }
        else if(t.error){ const e=document.createElement('div'); e.className='chat-msg bot'; e.textContent='Error: '+t.error; agentChatEl.appendChild(e); }
      }
      agentChatEl.scrollTop=agentChatEl.scrollHeight;
    }).catch(()=>{});
  }

  function addChat(id,role,text){
    if(!text) return;
    if(id===selectedAgentId){
      const d=document.createElement('div'); d.className='chat-msg '+role; d.textContent=text;
      agentChatEl.appendChild(d); agentChatEl.scrollTop=agentChatEl.scrollHeight;
    }
  }

  function clearAgentTrace(id){ agentTraces.set(id,[]); if(id===selectedAgentId) agentTraceEl.innerHTML=''; }
  function syncAgentTrace(id){
    agentTraceEl.innerHTML='';
    for(const m of (agentTraces.get(id)||[])) appendAct(agentTraceEl,m);
    agentTraceEl.scrollTop=agentTraceEl.scrollHeight;
  }
  function bumpFeed(id,m){ agentFeeds.set(id,(m.text||'').slice(0,50)); }

  $('btnNewAgent').addEventListener('click',()=>{
    const name=prompt('Agent name:','Agent '+(agents.length+1)); if(!name) return;
    wsSend({type:'agent:create',name,systemPrompt:defaultPrompt});
  });
  $('btnSavePrompt').addEventListener('click',()=>{ if(selectedAgentId) wsSend({type:'agent:prompt',agentId:selectedAgentId,systemPrompt:agentPromptEl.value}); });
  $('btnSelectVoice').addEventListener('click',()=>{ if(selectedAgentId) wsSend({type:'agent:select',agentId:selectedAgentId}); });
  $('btnPause').addEventListener('click',()=>{
    if(!selectedAgentId) return;
    const a=agents.find(x=>x.id===selectedAgentId);
    wsSend({type:a&&a.status==='paused'?'agent:resume_agent':'agent:pause',agentId:selectedAgentId});
  });
  $('btnHandoff').addEventListener('click',()=>{
    if(!selectedAgentId) return;
    const name=prompt('New agent name:','Handoff agent'); if(!name) return;
    wsSend({type:'agent:handoff',fromId:selectedAgentId,name,systemPrompt:agentPromptEl.value||defaultPrompt});
  });
  $('btnRunTask').addEventListener('click',()=>{
    if(!selectedAgentId||!agentTaskEl.value.trim()) return;
    wsSend({type:'agent:run',agentId:selectedAgentId,text:agentTaskEl.value.trim()});
    addChat(selectedAgentId,'user',agentTaskEl.value.trim()); agentTaskEl.value='';
  });
  agentTaskEl.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){e.preventDefault();$('btnRunTask').click();} });

  function fmtTime(ms){
    const d=new Date(ms);
    return d.toLocaleDateString([],{month:'short',day:'numeric'})+' '+d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  }
  function loadHistory(){
    historyDetailEl.style.display='none'; historyListEl.style.display='';
    historyLblEl.innerHTML='<span class="tag cc"></span>Past sessions';
    historyListEl.innerHTML='';
    fetch('/api/sessions').then(r=>r.json()).then(({sessions})=>{
      for(const s of (sessions||[])){
        const row=document.createElement('div'); row.className='sess-row';
        row.innerHTML='<div style="font-size:13px;color:#dfe4f2">'+(s.title||'(untitled)')+'</div><div style="font-size:11px;color:var(--dimmer);margin-top:4px">'+s.turn_count+' turns · '+fmtTime(s.updated_at)+'</div>';
        row.addEventListener('click',()=>openSession(s.id));
        historyListEl.appendChild(row);
      }
    }).catch(()=>{});
  }
  function openSession(id){
    fetch('/api/sessions/'+encodeURIComponent(id)).then(r=>r.json()).then((data)=>{
      historyListEl.style.display='none'; historyDetailEl.style.display='';
      historyDetailEl.innerHTML='';
      const back=document.createElement('button'); back.className='backbtn'; back.textContent='← Back';
      back.addEventListener('click',loadHistory); historyDetailEl.appendChild(back);
      for(const t of (data.turns||[])){
        const b=document.createElement('div'); b.className='turn-block';
        b.innerHTML='<div class="turn-lbl">You · '+fmtTime(t.ts)+'</div><div class="turn-user">'+(t.user_text||'')+'</div>';
        if(t.reply_text) b.innerHTML+='<div class="turn-lbl">Claude</div><div class="turn-reply">'+t.reply_text+'</div>';
        else if(t.error) b.innerHTML+='<div class="turn-err">'+t.error+'</div>';
        historyDetailEl.appendChild(b);
      }
    }).catch(()=>{});
  }

  const ACT_ICON={tool:'▸',thinking:'💭',say:'“',result:'↩'};
  function clearActivity(){ traceEl.innerHTML=''; traceBadge.classList.remove('show'); }
  function appendAct(el,m){
    const row=document.createElement('div');
    const kind=m.kind||'tool';
    row.className='act '+kind+(kind==='result'&&m.isError?' err':'');
    const ico=document.createElement('span'); ico.className='aico'; ico.textContent=ACT_ICON[kind]||'▸';
    const body=document.createElement('span'); body.className='body'; body.textContent=m.text||'';
    const wrap=document.createElement('div'); wrap.style.flex='1'; wrap.appendChild(body);
    if(m.detail){ const d=document.createElement('span'); d.className='detail'; d.textContent=m.detail; wrap.appendChild(d); }
    row.appendChild(ico); row.appendChild(wrap);
    el.appendChild(row); el.scrollTop=el.scrollHeight;
  }
  function addActivity(m,agentId){
    const id=agentId||activeVoiceAgentId;
    const arr=agentTraces.get(id)||[]; arr.push(m); agentTraces.set(id,arr);
    appendAct(traceEl,m);
    if(id===selectedAgentId) appendAct(agentTraceEl,m);
    traceBadge.classList.add('show');
  }

  function speak(text,error){
    claudeEl.classList.remove('muted'); claudeEl.textContent=text||'(no reply)';
    setState('speaking');
    const clean=(text||'').replace(/```[\s\S]*?```/g,' ').replace(/[`*_#>]/g,'').replace(/\s+/g,' ').trim().slice(0,1400)||'Done.';
    const finish=()=>{ if(bridgeReady) try{bridge.send(JSON.stringify({type:'resume'}));}catch{} if(running) setState('listening'); else setState('idle'); };
    if(!window.puter||!puter.ai||!puter.ai.txt2speech) return finish();
    puter.ai.txt2speech(clean).then(a=>{ a.onended=finish; a.onerror=finish; const p=a.play(); if(p&&p.catch)p.catch(finish); }).catch(finish);
  }

  function startVolumeMeter(source){
    try{
      analyser=audioCtx.createAnalyser(); analyser.fftSize=512; analyser.smoothingTimeConstant=.75;
      source.connect(analyser);
      const buf=new Uint8Array(analyser.frequencyBinCount);
      const tick=()=>{ if(!analyser) return; analyser.getByteTimeDomainData(buf);
        let s=0; for(let i=0;i<buf.length;i++){const v=(buf[i]-128)/128;s+=v*v;}
        body.style.setProperty('--vol',Math.min(1,Math.sqrt(s/buf.length)*4.5).toFixed(3));
        volTimer=requestAnimationFrame(tick); };
      tick();
    }catch{}
  }
  function stopVolumeMeter(){ if(volTimer) cancelAnimationFrame(volTimer); volTimer=null; body.style.setProperty('--vol','0'); }

  async function start(){
    if(running||location.protocol==='file:') return;
    try{
      audioCtx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
      if(audioCtx.state==='suspended') await audioCtx.resume();
      micStream=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
    }catch(e){ banner('Mic blocked: '+e.message); setState('error'); return; }
    const code="class P extends AudioWorkletProcessor{process(i){const c=i[0]&&i[0][0];if(c){const b=new Int16Array(c.length);for(let k=0;k<c.length;k++){let s=Math.max(-1,Math.min(1,c[k]));b[k]=s<0?s*0x8000:s*0x7FFF;}this.port.postMessage(b,[b.buffer]);}return true;}}registerProcessor('pcm',P);";
    await audioCtx.audioWorklet.addModule(URL.createObjectURL(new Blob([code],{type:'application/javascript'})));
    node=new AudioWorkletNode(audioCtx,'pcm');
    const src=audioCtx.createMediaStreamSource(micStream);
    src.connect(node); node.connect(audioCtx.destination);
    node.port.onmessage=(e)=>onPcm(e.data); startVolumeMeter(src);
    running=true; banner(''); hintEl.textContent='click or Space to stop';
    youEl.textContent='listening…'; claudeEl.textContent='…';
    if(bridgeReady) bridge.send(JSON.stringify({type:'start'}));
    setState('listening');
  }

  function onPcm(int16){
    if(!running||!bridgeReady||body.dataset.state!=='listening') return;
    const merged=new Int16Array(pcm.length+int16.length); merged.set(pcm); merged.set(int16,pcm.length); pcm=merged;
    while(pcm.length>=CHUNK){ bridge.send(pcm.slice(0,CHUNK).buffer); pcm=pcm.slice(CHUNK); }
  }

  function stop(){
    running=false; pcm=new Int16Array(0); stopVolumeMeter();
    if(bridgeReady) try{bridge.send(JSON.stringify({type:'stop'}));}catch{}
    try{micStream&&micStream.getTracks().forEach(t=>t.stop());}catch{}
    try{node&&node.disconnect(); audioCtx&&audioCtx.close();}catch{}
    hintEl.innerHTML='press <kbd>Space</kbd> or click to toggle'; setState('idle');
  }

  function toggle(){ running?stop():start(); }
  micEl.addEventListener('click',toggle);
  micEl.addEventListener('keydown',(e)=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();} });
  window.addEventListener('keydown',(e)=>{
    if(e.key!==' ') return;
    const t=e.target;
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable)) return;
    e.preventDefault(); toggle();
  });

  fetch('/config').then(r=>r.json()).then(c=>{
    setSession(c.projectDir,null); defaultPrompt=c.defaultSystemPrompt||'';
    footEl.textContent='connected · '+ (c.model||'claude');
    if(c&&!c.hasKey) banner('Set <code>DEEPGRAM_API_KEY</code> in <code>.env</code>');
  }).catch(()=>{});
  if(location.protocol!=='file:') connectBridge();
})();
</script>
